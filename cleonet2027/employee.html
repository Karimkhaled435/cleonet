<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cleonet Workspace</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="https://i.postimg.cc/5yVF1bx6/لوجو_كليو_نت.png" type="image/png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{ --bg:#050505; --text:white; --card:#0f0f0f; --blue:#1a45e6; --lime:#a9e318; }
.light{ --bg:#f2f2f2; --text:#111; --card:#ffffff; }
*{box-sizing:border-box;font-family:'Segoe UI',Arial,sans-serif}
body{ margin:0; background:var(--bg); color:var(--text); transition:.3s; }

#loadingScreen{ min-height:100vh; display:flex; justify-content:center; align-items:center; flex-direction:column; gap:15px; }
.spin{ display:inline-block; width:40px; height:40px; border:4px solid rgba(169,227,24,0.3); border-top-color:var(--lime); border-radius:50%; animation:sp 0.8s linear infinite; }
@keyframes sp{to{transform:rotate(360deg);}}
#site{display:none}

nav{ display:flex; align-items:center; padding:15px 25px; border-bottom:1px solid rgba(255,255,255,.1); justify-content:space-between; }
.nav-left{ display:flex; align-items:center; gap:20px; }
.nav-left img{ height:35px; }
.emp-info{ font-size:0.9rem; color:var(--gray); }
.emp-info span{ color:var(--lime); font-weight:bold; }
.nav-right{ display:flex; align-items:center; gap:15px; }
.btn-nav{ padding:8px 16px; border-radius:999px; border:1px solid var(--border); background:transparent; color:var(--text); cursor:pointer; transition:.3s; text-decoration:none; font-size:0.85rem;}
.btn-nav:hover{ background:var(--lime); color:#000; border-color:var(--lime); }
.btn-logout{ color:#ff4444; border-color:#ff4444; } .btn-logout:hover{ background:#ff4444; color:white; }

.theme-toggle{ width:50px;height:26px; background:#222; border-radius:999px; position:relative; cursor:pointer; }
.toggle-circle{ width:22px;height:22px; background:white; border-radius:50%; position:absolute; top:2px;left:2px; display:flex;align-items:center;justify-content:center; transition:.3s; font-size:12px; }
.light .toggle-circle{ left:26px;background:#ffcc00; }

header{ text-align:center; padding:50px 20px 30px; }
header h1{ margin-bottom:10px; text-transform:uppercase; letter-spacing:1px; }
header p{ color:#888; font-size:0.95rem; }
.search-box{ max-width:500px; margin:25px auto; border:2px solid var(--blue); border-radius:999px; padding:12px 20px; display:flex; gap:10px; align-items:center;}
.search-box i{color:var(--blue);}
.search-box input{ width:100%; background:transparent; border:none; outline:none; color:var(--text); font-size:1rem; }

.grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:20px; padding:20px 40px; max-width:1200px; margin:0 auto; }
.card{ background:var(--card); padding:20px; border-radius:16px; text-align:center; border:1px solid rgba(255,255,255,.05); transition:.3s; }
.card:hover{ transform:translateY(-6px); border-color:var(--lime); box-shadow:0 10px 20px rgba(0,0,0,0.2); }
.logo-wrap{ width:80px; height:80px; margin:0 auto 15px; border-radius:50%; overflow:hidden; background:#111; display:flex; align-items:center; justify-content:center;}
.logo-wrap img{ width:100%; height:100%; object-fit:contain; }
.card h3{ margin:0 0 15px; font-size:1.05rem; }
.btn{ display:block; padding:10px; border-radius:8px; background:rgba(26,69,230,0.1); color:var(--blue); text-decoration:none; font-weight:bold; transition:0.3s; border:1px solid rgba(26,69,230,0.3);}
.btn:hover{ background:var(--blue); color:white; }

#companyModal{ position:fixed; inset:0; background:rgba(0,0,0,.8); display:none; justify-content:center; align-items:center; z-index:9999; backdrop-filter:blur(5px); padding:15px;}
.modal-box{ background:var(--card); padding:30px; border-radius:20px; width:100%; max-width:350px; text-align:center; border:1px solid var(--blue); animation:fadeIn .3s ease; }
.modal-box input{ width:100%; padding:12px; border-radius:10px; border:1px solid var(--blue); background:rgba(255,255,255,0.05); color:var(--text); margin:15px 0; outline:none;}
.modal-box button{ padding:10px 20px; border-radius:10px; border:none; background:var(--blue); color:white; cursor:pointer; margin:5px; font-weight:bold; width:calc(50% - 15px);}
.modal-error{ color:#ff4444; display:none; font-size:14px; margin-bottom:10px; }
.modal-attempts{ color:orange; font-size:13px; }

.shake{animation:shake .4s}
@keyframes shake{ 0%{transform:translateX(0)} 25%{transform:translateX(-6px)} 50%{transform:translateX(6px)} 75%{transform:translateX(-6px)} 100%{transform:translateX(0)} }
.glitch{animation:glitch .7s infinite}
@keyframes glitch{ 0%{transform:translate(0)} 25%{transform:translate(-4px,3px)} 50%{transform:translate(4px,-3px)} 75%{transform:translate(-2px,2px)} 100%{transform:translate(0)} }
@keyframes fadeIn{ from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

/* الموبايل */
@media(max-width: 768px){
    nav { flex-direction: column; gap: 15px; text-align: center; }
    .nav-left { flex-direction: column; gap: 10px; }
    .nav-right { flex-wrap: wrap; justify-content: center; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); padding: 20px 15px; }
    .logo-wrap { width: 65px; height: 65px; }
}
</style>
</head>

<body>

<div id="loadingScreen">
    <div class="spin"></div>
    <p style="color:var(--lime);letter-spacing:1px;">Authenticating Workspace...</p>
</div>

<div id="site">
<nav>
    <div class="nav-left">
        <img src="https://i.postimg.cc/5yVF1bx6/لوجو_كليو_نت.png" alt="Cleonet">
        <div class="emp-info">Welcome, <span id="emp-name">Employee</span> <br> <small id="emp-role" style="color:#888;">Role</small></div>
    </div>
    <div class="nav-right">
        <button class="btn-nav" onclick="showCompanyModal()"><i class="fa-solid fa-lock"></i> Protected Files</button>
        <div class="theme-toggle" onclick="toggleMode()"><div class="toggle-circle">🌙</div></div>
        <button class="btn-nav btn-logout" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
    </div>
</nav>

<header>
    <h1>CLEONET WORKSPACE</h1>
    <p>All project resources, source files, and brand assets organized by client.</p>
    <div class="search-box">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="searchInput" placeholder="Search Client or Project Name...">
    </div>
</header>

<div class="grid" id="filesGrid"></div>
</div>

<div id="companyModal">
    <div class="modal-box" id="companyBox">
        <h3 style="margin-top:0"><i class="fa-solid fa-shield-halved" style="color:var(--lime);font-size:2rem;margin-bottom:10px;display:block;"></i> Protected File</h3>
        <p style="font-size:0.8rem;color:#888;">كلمة المرور الإضافية مطلوبة</p>
        <input type="password" id="companyPass" placeholder="Enter password">
        <div class="modal-error" id="companyError">Wrong password</div>
        <div class="modal-attempts" id="companyAttempts"></div>
        <div>
            <button onclick="checkCompanyPass()">Open File</button>
            <button onclick="hideCompanyModal()" style="background:transparent;border:1px solid #555;">Cancel</button>
        </div>
    </div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbz8v3XUGkHOLFXhEQBWbRm4Of5bpElpdPUdY7gdzRSlb8Pm673WmRrcxKr1qmpVBwnz/exec";
let archiveData = [];

window.onload = async () => {
    const sessionStr = localStorage.getItem('cl_session');
    if(!sessionStr) { window.location.href = 'index.html'; return; } 
    
    const user = JSON.parse(sessionStr);
    document.getElementById('emp-name').textContent = user.name;
    document.getElementById('emp-role').textContent = user.role;

    await fetchArchive();
    
    document.getElementById('loadingScreen').style.display = 'none';
    document.getElementById('site').style.display = 'block';
};

function logout() { localStorage.removeItem('cl_session'); window.location.href = 'index.html'; }

async function fetchArchive() {
    try {
        const res = await fetch(API+'?t='+Date.now());
        const j = await res.json();
        if(j.ok && j.data.archive) {
            archiveData = j.data.archive;
            render(archiveData);
        } else {
            document.getElementById('filesGrid').innerHTML = '<p style="color:#888;grid-column:1/-1;text-align:center;">No projects found. Manager needs to sync the dashboard.</p>';
        }
    } catch(e) {
        document.getElementById('filesGrid').innerHTML = '<p style="color:red;grid-column:1/-1;text-align:center;">Network Error.</p>';
    }
}

const grid = document.getElementById("filesGrid");
const searchInput = document.getElementById("searchInput");

function render(files) {
    grid.innerHTML = "";
    if(!files || files.length === 0) { grid.innerHTML = '<p style="color:#888;grid-column:1/-1;text-align:center;">No projects found.</p>'; return; }
    
    files.forEach(file => {
        if(!file.title) return; 
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
            <div class="logo-wrap"><img src="${file.logoUrl || 'https://via.placeholder.com/80?text=Logo'}" loading="lazy" onerror="this.src='https://via.placeholder.com/80?text=?'"></div>
            <h3>${file.title}</h3>
            <a class="btn" href="${file.downloadUrl || '#'}" target="_blank"><i class="fa-solid fa-cloud-arrow-down"></i> Open Files</a>
        `;
        grid.appendChild(card);
    });
}

searchInput.addEventListener("input", () => {
    const q = searchInput.value.toLowerCase();
    render(archiveData.filter(f => f.title && f.title.toLowerCase().includes(q)));
});

function toggleMode(){ document.body.classList.toggle("light"); document.querySelectorAll(".toggle-circle").forEach(el=>{ el.textContent=document.body.classList.contains("light")?"☀️":"🌙"; }); }

let companyTries=0, companyLocked=false;
function showCompanyModal(){ if(companyLocked) return; document.getElementById('companyModal').style.display="flex"; document.getElementById('companyError').style.display="none"; document.getElementById('companyAttempts').innerText="Attempts left: "+(3-companyTries); }
function hideCompanyModal(){ document.getElementById('companyModal').style.display="none"; }
function checkCompanyPass(){
    if(companyLocked) return;
    if(document.getElementById('companyPass').value === "Asd1122334455"){
        window.open("https://mega.nz/file/Hpp01ISQ#6N8kzdgMIytzpgPfLcRfHPpVFtCT_FAgWR0cVlQypT4","_blank");
        hideCompanyModal(); document.getElementById('companyPass').value=""; companyTries=0;
    } else {
        companyTries++; document.getElementById('companyError').style.display="block";
        if(companyTries>=3){
            companyLocked=true; document.getElementById('companyAttempts').innerText="Locked 30s...";
            setTimeout(()=>{ companyTries=0; companyLocked=false; document.getElementById('companyAttempts').innerText=""; },30000);
        } else { document.getElementById('companyAttempts').innerText="Attempts left: "+(3-companyTries); }
    }
}
</script>
</body>
</html>

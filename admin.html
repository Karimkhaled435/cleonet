<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLEONET | Admin Dashboard</title>
    <link rel="icon" href="https://i.postimg.cc/5yVF1bx6/لوجو_كليو_نت.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root{--bg:#050b14;--bg2:#0a1628;--lime:#a9e318;--blue:#1a45e6;--red:#ff4444;--border:rgba(255,255,255,0.08);--gray:#94a3b8;}
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Outfit',sans-serif;}
        body{background:var(--bg);color:white;min-height:100vh;}

        #login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;}
        #dashboard{display:none;}
        .topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:13px 28px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:200;}
        .body{padding:26px;max-width:1200px;margin:0 auto;}

        .btn{padding:9px 20px;border-radius:30px;font-size:0.85rem;font-weight:700;cursor:pointer;border:none;transition:0.2s;display:inline-flex;align-items:center;gap:6px;justify-content:center; white-space:nowrap;}
        .btn:disabled{opacity:0.5;cursor:not-allowed;}
        .btn.lime{background:var(--lime);color:#050b14;} .btn.lime:hover:not(:disabled){background:#bdf020;}
        .btn.out{background:transparent;color:white;border:1px solid var(--border);} .btn.out:hover:not(:disabled){border-color:var(--lime);color:var(--lime);}
        .btn.red{background:rgba(255,68,68,0.12);color:var(--red);border:1px solid rgba(255,68,68,0.3);} .btn.red:hover:not(:disabled){background:var(--red);color:white;}
        
        .tabs{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap;}
        .tab{padding:9px 22px;border-radius:30px;font-size:0.85rem;font-weight:700;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--gray);transition:0.2s;}
        .tab.on{background:var(--lime);color:#050b14;border-color:var(--lime);}
        .panel{display:none;} .panel.on{display:block;}
        
        .card{background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:22px;margin-bottom:18px;}
        .row2{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:13px;}
        .fg{display:flex;flex-direction:column;gap:5px;margin-bottom:13px;}
        .fg label{font-size:0.75rem;color:var(--gray);text-transform:uppercase;letter-spacing:0.9px;}
        .fg input, .fg select, .fg textarea{background:rgba(255,255,255,0.05);border:1px solid var(--border);color:white;padding:11px 13px;border-radius:9px;outline:none;}
        .fg input:focus, .fg select:focus, .fg textarea:focus{border-color:var(--lime);}
        
        .plans-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:15px;}
        .pac{background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:15px;padding:20px;}
        .pac ul{list-style:none;margin:15px 0;font-size:0.85rem;color:var(--gray);}
        .pac ul li{margin-bottom:5px;}
        
        .svcs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:15px;}
        .svc{background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:15px;padding:20px;}
        
        .u-list{display:flex;flex-direction:column;gap:10px;margin-top:20px;}
        .u-row{background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:10px;padding:15px;display:flex;justify-content:space-between;align-items:center;}
        
        .overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:none;align-items:center;justify-content:center;z-index:10000;padding:15px;}
        .overlay.open{display:flex;}
        .modal{background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:28px;width:100%;max-width:550px;}
        .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--lime);color:#050b14;padding:12px 30px;border-radius:30px;font-weight:700;font-size:0.9rem;z-index:99999;opacity:0;transition:opacity 0.3s;box-shadow:0 10px 30px rgba(169,227,24,0.3);text-align:center;width:max-content;max-width:90%;}
        .toast.show{opacity:1;}
        
        .status-badge { display:inline-flex; align-items:center; gap:8px; padding:8px 15px; border-radius:20px; background:rgba(169,227,24,0.1); color:var(--lime); font-size:0.85rem; font-weight:bold; border:1px solid rgba(169,227,24,0.3); }
        .status-badge.err { background:rgba(255,68,68,0.1); color:var(--red); border-color:rgba(255,68,68,0.3); }

        /* ==================================================
           📱 MOBILE RESPONSIVE FIXES 
           ================================================== */
        @media(max-width: 768px){
            .topbar { flex-direction: column; gap: 15px; padding: 15px; text-align: center; }
            .topbar .tr { width: 100%; display: flex; justify-content: center; gap: 10px; }
            .body { padding: 15px; }
            .tabs { justify-content: center; }
            .tab { padding: 8px 15px; font-size: 0.8rem; flex-grow: 1; text-align: center; }
            .row2 { grid-template-columns: 1fr; }
            .plans-grid, .svcs-grid { grid-template-columns: 1fr; }
            .u-row { flex-direction: column; text-align: center; gap: 15px; }
            .u-info { display: flex; flex-direction: column; align-items: center !important; }
            .u-row button { width: 100%; }
        }
    </style>
</head>
<body>

<div id="login-screen">
    <div style="text-align:center;">
        <i class="fa-solid fa-spinner fa-spin" style="font-size:2.5rem;color:var(--lime);margin-bottom:15px;"></i>
        <p>Verifying Access...</p>
    </div>
</div>

<div id="dashboard">
    <div class="topbar">
        <div style="display:flex;align-items:center;gap:10px;"><img src="https://i.postimg.cc/5yVF1bx6/لوجو_كليو_نت.png" height="30"><span style="font-weight:bold;color:var(--lime)">MANAGER PORTAL</span></div>
        <div class="tr">
            <a href="index.html" target="_blank" class="btn out"><i class="fa-solid fa-eye"></i> View Site</a>
            <button class="btn red" onclick="doLogout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
        </div>
    </div>

    <div class="body">
        <div class="tabs">
            <button class="tab on" onclick="sw('hero',this)"><i class="fa-solid fa-house"></i> Hero</button>
            <button class="tab" onclick="sw('pricing',this)"><i class="fa-solid fa-tags"></i> Pricing</button>
            <button class="tab" onclick="sw('services',this)"><i class="fa-solid fa-grid-2"></i> Services</button>
            <button class="tab" onclick="sw('partners',this)"><i class="fa-solid fa-handshake"></i> Partners</button>
            <button class="tab" onclick="sw('contact',this)"><i class="fa-solid fa-address-book"></i> Contact & Socials</button>
            <button class="tab" onclick="sw('team',this)"><i class="fa-solid fa-users"></i> Team Mgt</button>
            <button class="tab" onclick="sw('archive',this)"><i class="fa-solid fa-folder-open"></i> Archive</button>
            <button class="tab" onclick="sw('settings',this)"><i class="fa-solid fa-gear"></i> Settings</button>
        </div>

        <div class="panel on" id="p-hero">
            <div class="card">
                <h3><i class="fa-solid fa-house" style="color:var(--lime)"></i> Hero Section</h3><br>
                <div class="row2"><div class="fg"><label>Label</label><input id="h-sub"></div><div class="fg"><label>Button Text</label><input id="h-cta"></div></div>
                <div class="row2"><div class="fg"><label>Line 1</label><input id="h-l1"></div><div class="fg"><label>Line 2 (Gradient)</label><input id="h-l2"></div></div>
                <div class="fg"><label>Description</label><textarea id="h-desc" rows="3"></textarea></div>
                <button class="btn lime" onclick="saveHero(this)" style="width:100%"><i class="fa-solid fa-floppy-disk"></i> Save Changes</button>
            </div>
        </div>

        <div class="panel" id="p-pricing">
            <div class="card">
                <div style="display:flex;justify-content:space-between;margin-bottom:15px;align-items:center;"><h3><i class="fa-solid fa-tags" style="color:var(--lime)"></i> Pricing Plans</h3><button class="btn lime" onclick="openPlan(-1)"><i class="fa-solid fa-plus"></i> Add Plan</button></div>
                <div class="plans-grid" id="plans-grid"></div>
            </div>
        </div>

        <div class="panel" id="p-services">
            <div class="card">
                <div style="display:flex;justify-content:space-between;margin-bottom:15px;align-items:center;"><h3><i class="fa-solid fa-grid-2" style="color:var(--lime)"></i> Services</h3><button class="btn lime" onclick="openSvc(-1)"><i class="fa-solid fa-plus"></i> Add Service</button></div>
                <div class="svcs-grid" id="svcs-grid"></div>
            </div>
        </div>

        <div class="panel" id="p-partners">
            <div class="card">
                <div style="display:flex;justify-content:space-between;margin-bottom:15px;align-items:center;"><h3><i class="fa-solid fa-handshake" style="color:var(--lime)"></i> Partners</h3><button class="btn lime" onclick="openPartner(-1)"><i class="fa-solid fa-plus"></i> Add Partner</button></div>
                <div class="u-list" id="partners-list" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:15px;"></div>
            </div>
        </div>

        <div class="panel" id="p-contact">
            <div class="card">
                <h3><i class="fa-solid fa-address-book" style="color:var(--lime)"></i> Contact & Socials</h3><br>
                <div class="row2"><div class="fg"><label>Phone</label><input id="c-ph"></div><div class="fg"><label>Email</label><input id="c-em"></div></div>
                <div class="fg"><label>Address</label><input id="c-ad"></div><br>
                <div class="row2"><div class="fg"><label><i class="fa-brands fa-facebook" style="color:#1877f2"></i> Facebook</label><input id="s-fb"></div><div class="fg"><label><i class="fa-brands fa-tiktok"></i> TikTok</label><input id="s-tt"></div></div>
                <div class="row2"><div class="fg"><label><i class="fa-brands fa-instagram" style="color:#e1306c"></i> Instagram</label><input id="s-ig"></div><div class="fg"><label><i class="fa-brands fa-whatsapp" style="color:#25d366"></i> WhatsApp</label><input id="s-wa"></div></div>
                <button class="btn lime" onclick="saveContact(this)" style="width:100%"><i class="fa-solid fa-floppy-disk"></i> Save Links</button>
            </div>
        </div>

        <div class="panel" id="p-team">
            <div class="row2">
                <div class="card">
                    <h3 style="margin-bottom:20px;"><i class="fa-solid fa-user-plus" style="color:var(--lime)"></i> Add Employee</h3>
                    <div class="fg"><label>Full Name</label><input type="text" id="n-name"></div>
                    <div class="fg"><label>Email (Username)</label><input type="text" id="n-email"></div>
                    <div class="fg"><label>Password</label><input type="text" id="n-pass"></div>
                    <div class="fg"><label>Department</label><select id="n-role"><option value="Content Creator">Content Creator</option><option value="Graphic Designer">Graphic Designer</option><option value="Video Editor">Video Editor</option><option value="Manager">Manager (Admin Access)</option></select></div>
                    <button class="btn lime" onclick="addUser(this)" style="width:100%"><i class="fa-solid fa-check"></i> Create Account</button>
                </div>
                <div class="card"><h3><i class="fa-solid fa-address-book" style="color:var(--lime)"></i> Current Team</h3><div class="u-list" id="users-grid"></div></div>
            </div>
        </div>

        <div class="panel" id="p-archive">
            <div class="row2">
                <div class="card">
                    <h3 style="margin-bottom:20px;"><i class="fa-solid fa-file-circle-plus" style="color:var(--lime)"></i> Add Project File</h3>
                    <div class="fg"><label>Client Name</label><input type="text" id="a-title"></div>
                    <div class="fg"><label>Logo URL</label><input type="url" id="a-logo"></div>
                    <div class="fg"><label>Files Link (Mega/Drive)</label><input type="url" id="a-link"></div>
                    <button class="btn lime" onclick="addArchive(this)" style="width:100%"><i class="fa-solid fa-cloud-arrow-up"></i> Save Project</button>
                </div>
                <div class="card"><h3><i class="fa-solid fa-server" style="color:var(--lime)"></i> Active Projects</h3><div class="u-list" id="archive-grid"></div></div>
            </div>
        </div>

        <div class="panel" id="p-settings">
            <div class="card" style="max-width:500px;margin:0 auto;">
                <h3 style="margin-bottom:20px;"><i class="fa-solid fa-gear" style="color:var(--lime)"></i> System Settings</h3>
                
                <div style="margin-bottom:25px;padding:15px;background:rgba(255,255,255,0.02);border-radius:10px;border:1px solid var(--border);">
                    <p style="color:var(--gray);font-size:0.85rem;margin-bottom:10px;">Database Connection Status</p>
                    <div id="db-status" class="status-badge"><i class="fa-solid fa-circle-check"></i> Connected & Synced</div>
                </div>

                <div style="display:flex;flex-direction:column;gap:15px;">
                    <button class="btn out" onclick="refreshData(this)" style="width:100%;justify-content:center;"><i class="fa-solid fa-rotate"></i> Force Sync with Google Sheets</button>
                    <button class="btn red" onclick="clearCache()" style="width:100%;justify-content:center;"><i class="fa-solid fa-broom"></i> Clear Local Cache</button>
                </div>
            </div>
        </div>

    </div>
</div>

<div class="overlay" id="m-plan"><div class="modal"><h3 style="margin-bottom:15px;"><i class="fa-solid fa-tags" style="color:var(--lime)"></i> Plan Configuration</h3>
    <div class="row2"><div class="fg"><label>Name</label><input id="pm-name"></div><div class="fg"><label>Price</label><input id="pm-price"></div></div>
    <div class="row2"><div class="fg"><label>Popular Plan?</label><select id="pm-feat"><option value="false">No</option><option value="true">Yes ⭐</option></select></div><div class="fg"><label>WhatsApp Text</label><input id="pm-wa" placeholder="Ex: Gold"></div></div>
    <div class="fg"><label>Features (1 per line)</label><textarea id="pm-feats" rows="5"></textarea></div>
    <div class="mf"><button class="btn out" onclick="closeM('m-plan')">Cancel</button><button class="btn lime" onclick="savePlan(this)"><i class="fa-solid fa-save"></i> Save</button></div>
</div></div>

<div class="overlay" id="m-svc"><div class="modal"><h3 style="margin-bottom:15px;"><i class="fa-solid fa-grid-2" style="color:var(--lime)"></i> Service Detail</h3><div class="fg"><label>Title</label><input id="sm-title"></div><div class="fg"><label>FontAwesome Icon Class</label><input id="sm-icon" placeholder="fa-solid fa-star"></div><div class="fg"><label>Description</label><textarea id="sm-desc" rows="4"></textarea></div><div class="mf"><button class="btn out" onclick="closeM('m-svc')">Cancel</button><button class="btn lime" onclick="saveSvc(this)"><i class="fa-solid fa-save"></i> Save</button></div></div></div>

<div class="overlay" id="m-partner"><div class="modal"><h3 style="margin-bottom:15px;"><i class="fa-solid fa-handshake" style="color:var(--lime)"></i> Partner Logo</h3><div class="fg"><label>Logo Image URL</label><input id="par-url" placeholder="https://i.postimg.cc/..."></div><div class="mf"><button class="btn out" onclick="closeM('m-partner')">Cancel</button><button class="btn lime" onclick="savePartner(this)"><i class="fa-solid fa-save"></i> Save</button></div></div></div>

<div class="toast" id="toast"></div>

<script>
const API = "https://script.google.com/macros/s/AKfycbz8v3XUGkHOLFXhEQBWbRm4Of5bpElpdPUdY7gdzRSlb8Pm673WmRrcxKr1qmpVBwnz/exec";
let D = { hero:[], pricing:[], services:[], partners:[], contact:[], users: [], archive: [] };
let editIdx = { plan:-1, svc:-1, partner:-1 };

const hardcodedArchive = [
    {title:"ميكادو كافيه",logoUrl:"https://i.postimg.cc/52qz7cgf/image.png",downloadUrl:"https://mega.nz/file/ioQEiQJT#2P45Bn_vT5cJl5wdvX_3_o99pkrJocfPhVKSRfUi-Qo"},
    {title:"د.عصام",logoUrl:"https://i.postimg.cc/prC7JVrr/lwjw-ʿsam-(2).png",downloadUrl:"https://mega.nz/file/S9I2WSAJ#9v-dspd1uA5unLnCw8o7PST2lFETktXns3zsfzH1vjM"},
    {title:"د.احمد امين",logoUrl:"https://i.postimg.cc/9FqZ98nP/image.png",downloadUrl:"https://mega.nz/file/qxpQRDxC#zERJA7acKVnmhKlbbl8guI3C6SWX-mazNs_rEJ1c6xw"},
    {title:"مطعم الزعيم",logoUrl:"https://i.postimg.cc/wM5tWZYN/image.png",downloadUrl:"https://mega.nz/file/f1JF3Rza#ZWXH-G_GKKtpFr8eRb_ydvPqvFWbCQfGMkjZwBQWpxA"},
    {title:"مطعم المحمدي",logoUrl:"https://i.postimg.cc/m2DRpK4s/image.png",downloadUrl:"https://mega.nz/file/ylZwlAQQ#OJKSoCAk-RTEC5CD2ky5CYWo7S41r9GJ16PQYDTh_hg"},
    {title:"ايجيبتاستيك",logoUrl:"https://i.postimg.cc/vBVXmYfS/image.png",downloadUrl:"https://mega.nz/file/3spVVZjB#heRecFw376qA3imxLnPs06y4cYYaKJdjiuomKRyNOKs"},
    {title:"بيت الفلافل",logoUrl:"https://i.postimg.cc/yxQ0s2x5/image.png",downloadUrl:"https://mega.nz/file/LlwF1CoI#ARyM5GyKrjlLsJkfMMbBYvOTMc0ii0jbGZ0ytGYQT5w"},
    {title:"بيج برازر",logoUrl:"https://i.postimg.cc/1tT9SHP2/image.png",downloadUrl:"https://mega.nz/file/2sY1lLxQ#VF0sGi3Dtu1DvGOd9gL0YSHMuLXhVk3ZrT2-mpUZfJY"},
    {title:"بيروكيك",logoUrl:"https://i.postimg.cc/MKn9XYwD/image.png",downloadUrl:"https://mega.nz/file/vh5QWRgJ#ZoCQpwwZ_dNXp38LsHDgUJntkc_sC-HxTAvDefVMz8M"},
    {title:"تشيكن بروست",logoUrl:"https://i.postimg.cc/zfxtPD13/image.png",downloadUrl:"https://mega.nz/file/WlxlnZjS#npH5kGsEWygnj_VRfcszMeeC89aCRoIkZ36_OIoozag"},
    {title:"جرين",logoUrl:"https://i.postimg.cc/tCb3W0Lh/image.png",downloadUrl:"https://mega.nz/file/zpYT2KQa#wukju26_NPlEphcoojNWyypmTdqWzydToLEzgXUCeEA"},
    {title:"جلوبال",logoUrl:"https://i.postimg.cc/RFzFymQm/image.png",downloadUrl:"https://mega.nz/file/TwwSXYZK#63eaMLv8xsrX9ReYinVfMKQeRu4KxPkXKD4YZPC3TKE"},
    {title:"د.كريم",logoUrl:"https://i.postimg.cc/JnTfJchf/image.png",downloadUrl:"https://mega.nz/file/zkhkxACZ#kz5g1RG2JzZVsb4FSvMVdRdg-Ths2uaXXHn9BolwLyQ"},
    {title:"ستار سبا",logoUrl:"https://i.postimg.cc/SKZ47pTf/image.png",downloadUrl:"https://mega.nz/file/vppgXDyI#5EEZZQq0NgU-OlCNusp9xwQOCLo_F3Q8v4LcrbmP6P4"},
    {title:"طيبة للتكييف",logoUrl:"https://i.postimg.cc/XvqmWBL9/image.png",downloadUrl:"https://mega.nz/file/LkoC3DyT#uGnPkm_47WWwNGTP9Gqx5dDED-dm5xZhAqggCwVEtNo"},
    {title:"كافيه كايا",logoUrl:"https://i.postimg.cc/8PwZCPjd/image.png",downloadUrl:"https://mega.nz/file/r8QHWIzL#3_O7bXUfPaJl9QYkEClbEl_KEx0zEJNS03tDcws3b-U"},
    {title:"كيور",logoUrl:"https://i.postimg.cc/d0cZPGJc/image.png",downloadUrl:"https://mega.nz/file/H8QzCS7A#oSnX0AlDwCl2x0EMI039qJf4k8wv0_hPtX4fJ9cWH28"},
    {title:"قصر خليفة",logoUrl:"https://i.postimg.cc/kGrgm5M5/image.png",downloadUrl:"https://mega.nz/file/O8AXFTSJ#fvtLtVxCsp_4lEzAjmxOuKHVO8EpnSs3ae4FeUY7LMI"},
    {title:"درب العمدة",logoUrl:"https://i.postimg.cc/Y09f7zhk/image.png",downloadUrl:"https://mega.nz/file/atQmlRoA#_m6tva3KViNPUrQPm_kBaRDdz7lO3RQ3vj4nwuqhtLA"}
];
const hardcodedServices = [
    { icon:"fa-solid fa-share-nodes", title:"Social Media Mgt", desc:"Crafting strategy, content, and visuals that truly represent your brand." },
    { icon:"fa-solid fa-bullhorn", title:"Paid Advertising", desc:"Targeted campaigns (Meta, Google & More) that deliver real ROI." },
    { icon:"fa-solid fa-laptop-code", title:"Web Development", desc:"Clean, responsive websites that reflect your brand and engage users." },
    { icon:"fa-solid fa-video", title:"Creative Content", desc:"Photos, Videos, Scripts, Storytelling. Content that converts." },
    { icon:"fa-solid fa-pen-nib", title:"Graphic Design", desc:"From Logos to full brand identities. Design with purpose." },
    { icon:"fa-solid fa-magnifying-glass-location", title:"SEO & Maps", desc:"Get found by the right people, in the right place, at the right time." }
];

window.onload = async () => {
    const sessionStr = localStorage.getItem('cl_session');
    if(!sessionStr) { window.location.href = 'index.html'; return; }
    const user = JSON.parse(sessionStr);
    if(user.role !== 'Manager') { window.location.href = 'index.html'; return; }
    await fetchAllData();
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
};

function doLogout() { localStorage.removeItem('cl_session'); window.location.href = 'index.html'; }
function sw(name, btn) { document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on')); document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on')); document.getElementById('p-'+name).classList.add('on'); btn.classList.add('on'); }

// Loading Utilities
function btnLoad(btn) { if(!btn) return; btn.dataset.og = btn.innerHTML; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Processing...'; btn.disabled = true; }
function btnDone(btn) { if(!btn) return; btn.innerHTML = btn.dataset.og; btn.disabled = false; }

// Core Data
async function fetchAllData() {
    try {
        const res = await fetch(API+'?t='+Date.now());
        const j = await res.json();
        if(j.ok) { 
            D = j.data; 
            document.getElementById('db-status').className = 'status-badge';
            document.getElementById('db-status').innerHTML = '<i class="fa-solid fa-circle-check"></i> Connected & Synced';
            if (!D.archive || D.archive.length < 5) { D.archive = hardcodedArchive; await push('archive', D.archive); }
            if (!D.services || D.services.length < 2) { D.services = hardcodedServices; await push('services', D.services); }
            renderAll(); 
        }
    } catch(e) { 
        document.getElementById('db-status').className = 'status-badge err';
        document.getElementById('db-status').innerHTML = '<i class="fa-solid fa-circle-exclamation"></i> Connection Failed';
        toast("Network Error.", true); 
    }
}

async function refreshData(btn) { btnLoad(btn); await fetchAllData(); btnDone(btn); toast('✅ Data Sync Complete!'); }
function clearCache() { localStorage.removeItem('cln_v4'); toast('🧹 Cache Cleared!'); }

function renderAll() { loadHeroForm(); renderPlans(); renderSvcs(); renderPartners(); loadContactForm(); renderUsers(); renderArchive(); }

// -- HERO --
function loadHeroForm() {
    const h = D.hero?.[0] || {};
    document.getElementById('h-sub').value = h.subtitle||''; document.getElementById('h-l1').value = h.line1||''; document.getElementById('h-l2').value = h.line2||''; document.getElementById('h-desc').value = h.desc||''; document.getElementById('h-cta').value = h.cta||'';
}
async function saveHero(btn) {
    btnLoad(btn);
    const payload = [{ subtitle: document.getElementById('h-sub').value, line1: document.getElementById('h-l1').value, line2: document.getElementById('h-l2').value, desc: document.getElementById('h-desc').value, cta: document.getElementById('h-cta').value }];
    D.hero = payload; await push('hero', payload); btnDone(btn); toast('✅ Hero updated!');
}

// -- PRICING --
function renderPlans() {
    const g = document.getElementById('plans-grid'); g.innerHTML = '';
    (D.pricing||[]).forEach((pl, i) => {
        const feat = pl.featured==true||pl.featured==='true';
        const feats = Array.isArray(pl.features)?pl.features:[];
        g.innerHTML += `<div class="pac" style="${feat?'border-color:var(--lime);position:relative;':''}">${feat?'<div style="position:absolute;top:-10px;right:15px;background:var(--lime);color:#000;font-size:0.7rem;font-weight:bold;padding:2px 10px;border-radius:10px;">★ Popular</div>':''}<div style="font-size:1.2rem;font-weight:900;color:var(--lime)">${pl.name}</div><div style="font-size:1.8rem;font-weight:bold;margin:10px 0;">${pl.price}</div><ul>${feats.map(f=>`<li><i class="fa-solid fa-check" style="color:var(--lime);margin-right:5px;"></i> ${f}</li>`).join('')}</ul><div style="display:flex;gap:10px;margin-top:15px;"><button class="btn out" style="flex:1" onclick="openPlan(${i})"><i class="fa-solid fa-pen"></i> Edit</button><button class="btn red" onclick="delPlan(${i}, this)"><i class="fa-solid fa-trash"></i></button></div></div>`;
    });
}
function openPlan(idx) {
    editIdx.plan = idx; const pl = idx===-1 ? {} : (D.pricing[idx]||{});
    document.getElementById('pm-name').value=pl.name||''; 
    document.getElementById('pm-price').value=pl.price||''; 
    document.getElementById('pm-feat').value=(pl.featured==true||pl.featured==='true')?'true':'false';
    document.getElementById('pm-wa').value=pl.waText||'';
    document.getElementById('pm-feats').value=(Array.isArray(pl.features)?pl.features:[]).join('\n');
    openM('m-plan');
}
async function savePlan(btn) {
    btnLoad(btn);
    const pl = { name: document.getElementById('pm-name').value.trim(), price: document.getElementById('pm-price').value.trim(), featured: document.getElementById('pm-feat').value === 'true', waText: document.getElementById('pm-wa').value.trim(), features: document.getElementById('pm-feats').value.split('\n').filter(Boolean) };
    if(editIdx.plan===-1) D.pricing.push(pl); else D.pricing[editIdx.plan]=pl;
    await push('pricing', D.pricing); closeM('m-plan'); renderPlans(); btnDone(btn); toast('✅ Plan Saved!');
}
async function delPlan(i, btn) { if(!confirm('Delete this plan?')) return; btnLoad(btn); D.pricing.splice(i,1); await push('pricing', D.pricing); renderPlans(); toast('🗑️ Deleted!'); }

// -- SERVICES --
function renderSvcs() {
    const g = document.getElementById('svcs-grid'); g.innerHTML = '';
    (D.services||[]).forEach((s,i) => {
        g.innerHTML += `<div class="svc"><i class="${s.icon} si" style="font-size:2rem;color:var(--blue);margin-bottom:10px;display:block;"></i><h4 style="font-size:1.1rem;margin-bottom:8px;">${s.title}</h4><p style="font-size:0.85rem;color:var(--gray);line-height:1.5;margin-bottom:15px;">${s.desc}</p><div style="display:flex;gap:10px;"><button class="btn out" style="flex:1" onclick="openSvc(${i})"><i class="fa-solid fa-pen"></i> Edit</button><button class="btn red" onclick="delSvc(${i}, this)"><i class="fa-solid fa-trash"></i></button></div></div>`;
    });
}
function openSvc(idx) {
    editIdx.svc = idx; const s = idx===-1?{}:(D.services[idx]||{});
    document.getElementById('sm-title').value=s.title||''; document.getElementById('sm-icon').value=s.icon||''; document.getElementById('sm-desc').value=s.desc||'';
    openM('m-svc');
}
async function saveSvc(btn) {
    btnLoad(btn);
    const s = { title: document.getElementById('sm-title').value, icon: document.getElementById('sm-icon').value, desc: document.getElementById('sm-desc').value };
    if(editIdx.svc===-1) D.services.push(s); else D.services[editIdx.svc]=s;
    await push('services', D.services); closeM('m-svc'); renderSvcs(); btnDone(btn); toast('✅ Service Saved!');
}
async function delSvc(i, btn) { if(!confirm('Delete this service?')) return; btnLoad(btn); D.services.splice(i,1); await push('services', D.services); renderSvcs(); toast('🗑️ Deleted!'); }

// -- PARTNERS --
function renderPartners() {
    const g = document.getElementById('partners-list'); g.innerHTML = '';
    (D.partners||[]).forEach((p,i) => {
        g.innerHTML += `<div class="u-row" style="flex-direction:column;gap:10px;"><img src="${p.url}" style="height:40px;object-fit:contain;width:100%;"><button class="btn red" style="width:100%" onclick="delPartner(${i}, this)"><i class="fa-solid fa-trash"></i> Delete</button></div>`;
    });
}
function openPartner(idx) { editIdx.partner=idx; document.getElementById('par-url').value=idx===-1?'':D.partners[idx].url; openM('m-partner'); }
async function savePartner(btn) {
    btnLoad(btn);
    const p = { url: document.getElementById('par-url').value };
    if(editIdx.partner===-1) D.partners.push(p); else D.partners[editIdx.partner]=p;
    await push('partners', D.partners); closeM('m-partner'); renderPartners(); btnDone(btn); toast('✅ Partner Saved!');
}
async function delPartner(i, btn) { if(!confirm('Delete this partner logo?')) return; btnLoad(btn); D.partners.splice(i,1); await push('partners', D.partners); renderPartners(); toast('🗑️ Deleted!'); }

// -- CONTACT & SOCIALS --
function loadContactForm() {
    const c = D.contact?.[0]||{};
    document.getElementById('c-ph').value = c.phone||''; document.getElementById('c-em').value = c.email||''; document.getElementById('c-ad').value = c.address||'';
    document.getElementById('s-fb').value = c.facebook||''; document.getElementById('s-tt').value = c.tiktok||''; document.getElementById('s-ig').value = c.instagram||''; document.getElementById('s-wa').value = c.whatsapp||'';
}
async function saveContact(btn) {
    btnLoad(btn);
    const sv = id => document.getElementById(id).value.trim();
    const payload = [{ phone:sv('c-ph'), email:sv('c-em'), address:sv('c-ad'), facebook:sv('s-fb'), tiktok:sv('s-tt'), instagram:sv('s-ig'), whatsapp:sv('s-wa') }];
    D.contact = payload; await push('contact', payload); btnDone(btn); toast('✅ Contact Info Saved!');
}

// -- USERS --
function renderUsers() {
    const grid = document.getElementById('users-grid'); grid.innerHTML = '';
    (D.users || []).forEach((u, i) => {
        grid.innerHTML += `<div class="u-row"><div class="u-info"><h4>${u.name} <span style="font-size:0.7rem;background:#333;padding:3px 8px;border-radius:10px;color:white;margin-left:5px;">${u.role}</span></h4><p><i class="fa-solid fa-envelope"></i> ${u.email} &nbsp;|&nbsp; <i class="fa-solid fa-lock"></i> ${u.pass}</p></div>${u.email==='admin'?'':`<button class="btn red" onclick="deleteUser(${i}, this)"><i class="fa-solid fa-trash"></i></button>`}</div>`;
    });
}
async function addUser(btn) {
    const n = document.getElementById('n-name').value, e = document.getElementById('n-email').value, p = document.getElementById('n-pass').value, r = document.getElementById('n-role').value;
    if(!n || !e || !p) return alert("Fill all fields");
    btnLoad(btn);
    if(!D.users) D.users = []; D.users.push({ name: n, email: e, pass: p, role: r });
    await push('users', D.users); 
    ['n-name','n-email','n-pass'].forEach(id => document.getElementById(id).value='');
    renderUsers(); btnDone(btn); toast('✅ Employee Added!');
}
async function deleteUser(i, btn) { if(!confirm("Remove employee?")) return; btnLoad(btn); D.users.splice(i, 1); await push('users', D.users); renderUsers(); toast('🗑️ Employee removed!'); }

// -- ARCHIVE --
function renderArchive() {
    const grid = document.getElementById('archive-grid'); grid.innerHTML = '';
    (D.archive || []).forEach((a, i) => {
        if(!a.title) return;
        grid.innerHTML += `<div class="u-row" style="align-items:center;"><div class="u-info" style="display:flex;gap:15px;align-items:center;"><img src="${a.logoUrl}" style="width:50px;height:50px;border-radius:8px;object-fit:contain;background:#111;padding:5px;"><div><h4 style="font-size:1.1rem;">${a.title}</h4><p><a href="${a.downloadUrl}" target="_blank" style="color:var(--lime);text-decoration:none;"><i class="fa-solid fa-link"></i> Project Link</a></p></div></div><button class="btn red" onclick="deleteArchive(${i}, this)"><i class="fa-solid fa-trash"></i></button></div>`;
    });
}
async function addArchive(btn) {
    const t = document.getElementById('a-title').value, l = document.getElementById('a-logo').value, d = document.getElementById('a-link').value;
    if(!t || !d) return alert("Title and Link are required");
    btnLoad(btn);
    if(!D.archive) D.archive = []; D.archive.push({ title: t, logoUrl: l, downloadUrl: d });
    await push('archive', D.archive); 
    ['a-title','a-logo','a-link'].forEach(id => document.getElementById(id).value='');
    renderArchive(); btnDone(btn); toast('✅ Project Added!');
}
async function deleteArchive(i, btn) { if(!confirm("Delete this project from workspace?")) return; btnLoad(btn); D.archive.splice(i, 1); await push('archive', D.archive); renderArchive(); toast('🗑️ Project deleted!'); }

// -- CORE API --
async function push(section, data) {
    try {
        const res = await fetch(API, { method:'POST', body:JSON.stringify({ section, data }) });
        const json = await res.json();
        return json.ok;
    } catch(e) { return false; }
}

function openM(id)  { document.getElementById(id).classList.add('open'); }
function closeM(id) { document.getElementById(id).classList.remove('open'); }
let tTimer; function toast(msg, isErr=false) { const el = document.getElementById('toast'); el.textContent = msg; el.style.background=isErr?'#ff4444':'var(--lime)'; el.style.color=isErr?'white':'#050b14'; el.classList.add('show'); clearTimeout(tTimer); tTimer = setTimeout(()=>el.classList.remove('show'),3500); }
</script>
